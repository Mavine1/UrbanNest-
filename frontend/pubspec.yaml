name: real_estate_app
description: A Flutter Real Estate App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI & utilities
  google_fonts: ^6.1.0
  flutter_dotenv: ^5.1.0

  # State management
  provider: ^6.1.1

  # Networking
  dio: ^5.4.0

  # Authentication
  google_sign_in: ^6.1.5

  # Local storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    